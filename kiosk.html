<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FC Birrarung Signage</title>
  <script src="config.js"></script>
  <style>
    /* ─── RESET ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: sans-serif;
    }

    /* ─── KIOSK CONTAINER: 9:16 centred ─────────────────────── */
    #kiosk {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #stage {
      position: relative;
      background: #000;
      overflow: hidden;
    }

    #stage.portrait {
      aspect-ratio: 9 / 16;
      height: 100%;
      max-height: 100vh;
      max-width: calc(100vh * 9 / 16);
    }

    #stage.landscape {
      aspect-ratio: 16 / 9;
      width: 100%;
      max-width: 100vw;
      max-height: calc(100vw * 9 / 16);
    }

    /* ─── MEDIA SLOTS ────────────────────────────────────────── */
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      /* Hard cut: no transition */
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .slide video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ─── LOADING / ERROR OVERLAY ────────────────────────────── */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #fff;
      gap: 1.5rem;
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #overlay .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    #overlay .msg {
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      opacity: 0.6;
      text-transform: uppercase;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ─── STATUS BADGE (bottom-right, subtle) ────────────────── */
    #status {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.25);
      z-index: 20;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div id="kiosk">
  <div id="stage">

    <!-- Loading/error overlay -->
    <div id="overlay">
      <div class="spinner"></div>
      <div class="msg" id="overlayMsg">Loading playlist...</div>
    </div>

    <!-- Slides injected here by JS -->

    <!-- Status badge -->
    <div id="status">Initialising...</div>

  </div>
</div>

<script>
/* CONFIG is loaded from config.js (see config.example.js for the template).
   URL usage: kiosk.html?tv=1  /  ?tv=2  /  ?tv=3  (defaults to TV 1) */

/* ─── RESOLVE WHICH TV THIS INSTANCE IS ─────────────────────── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW registration failed:', err));
}

const tvParam = parseInt(new URLSearchParams(window.location.search).get('tv'), 10);
const TV_NUM  = [1, 2, 3].includes(tvParam) ? tvParam : 1;
document.getElementById('stage').classList.add(CONFIG.ORIENTATIONS?.[TV_NUM] ?? 'landscape');
/* ═══════════════════════════════════════════════════════════════ */


/* ─── STATE ──────────────────────────────────────────────────── */
let playlist   = [];   // Array of { name, mimeType, url }
let currentIdx = 0;
let slideTimer = null;
let slides     = [];   // DOM elements

const stage      = document.getElementById('stage');
const overlay    = document.getElementById('overlay');
const overlayMsg = document.getElementById('overlayMsg');
const statusEl   = document.getElementById('status');


/* ─── CLOUDFLARE R2 HELPERS ──────────────────────────────────── */

/**
 * Fetch the playlist for this TV from the Cloudflare Worker.
 * Worker returns: [{ name, url, mimeType }]
 */
async function fetchPlaylist() {
  const res = await fetch(`${CONFIG.WORKER_URL}/playlist/${TV_NUM}`);

  if (!res.ok) {
    throw new Error(`Worker error ${res.status}: ${res.statusText}`);
  }

  return res.json();
}


/* ─── SLIDE MANAGEMENT ───────────────────────────────────────── */

function isVideo(mimeType) {
  return CONFIG.VIDEO_TYPES.includes(mimeType);
}

/**
 * Rebuild the slide DOM elements from the current playlist.
 * Attempts to reuse existing slides to avoid re-downloading media.
 */
function buildSlides(newPlaylist) {
  // Remove old slides
  slides.forEach(s => s.remove());
  slides = [];

  newPlaylist.forEach((item, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide';
    slide.dataset.idx = i;

    if (isVideo(item.mimeType)) {
      const vid = document.createElement('video');
      vid.src = item.url;
      vid.muted = true;
      vid.playsInline = true;
      vid.preload = 'auto';
      // When video ends, advance to next slide
      vid.addEventListener('ended', () => advance());
      vid.addEventListener('error', (e) => {
        console.error(`Video load error for ${item.name}:`, e);
        advance(); // skip broken file
      });
      slide.appendChild(vid);
    } else {
      const img = document.createElement('img');
      img.src = item.url;
      img.alt = item.name;
      img.addEventListener('error', () => {
        console.error(`Image load error for ${item.name}`);
        advance(); // skip broken file
      });
      slide.appendChild(img);
    }

    stage.insertBefore(slide, document.getElementById('status'));
    slides.push(slide);
  });
}

/**
 * Show the slide at the given index (hard cut).
 */
function showSlide(idx) {
  // Deactivate all
  slides.forEach(s => {
    s.classList.remove('active');
    // Pause any playing videos
    const vid = s.querySelector('video');
    if (vid) vid.pause();
  });

  if (slides.length === 0) return;

  const slide = slides[idx];
  slide.classList.add('active');

  const vid = slide.querySelector('video');
  if (vid) {
    vid.currentTime = 0;
    vid.play().catch(err => {
      // Autoplay blocked -- advance past this slide
      console.warn('Autoplay blocked:', err);
      advance();
    });
    // No timer for videos; 'ended' event handles advance
  } else {
    // Image: set a timer
    clearTimeout(slideTimer);
    slideTimer = setTimeout(() => advance(), CONFIG.IMAGE_DURATION_SEC * 1000);
  }

  updateStatus();
}

/**
 * Move to the next slide, wrapping around.
 */
function advance() {
  if (slides.length === 0) return;
  currentIdx = (currentIdx + 1) % slides.length;
  showSlide(currentIdx);
}

function updateStatus() {
  const item = playlist[currentIdx];
  if (!item) return;
  statusEl.textContent = `TV${TV_NUM} · ${currentIdx + 1} / ${playlist.length}`;
}


/* ─── PLAYLIST REFRESH ───────────────────────────────────────── */

async function syncCache(newPlaylist) {
  if (!('caches' in window)) return;
  const cache = await caches.open('fcb-media-v1');
  const keys  = await cache.keys();
  const cachedUrls = new Set(keys.map(r => r.url));
  const newUrls    = new Set(newPlaylist.map(p => p.url));

  // Pre-fetch files not yet cached (background, non-blocking)
  for (const item of newPlaylist) {
    if (!cachedUrls.has(item.url)) {
      fetch(item.url).then(r => { if (r.ok) cache.put(item.url, r); }).catch(() => {});
    }
  }

  // Remove files no longer in the playlist
  for (const request of keys) {
    if (!newUrls.has(request.url)) cache.delete(request);
  }
}

async function refreshPlaylist() {
  try {
    const newPlaylist = await fetchPlaylist();

    if (newPlaylist.length === 0) {
      console.warn('R2 folder is empty or no supported media found.');
      overlayMsg.textContent = 'No media found in folder.';
      overlay.classList.remove('hidden');
      return;
    }

    // Check if playlist actually changed (compare URLs)
    const oldUrls = playlist.map(p => p.url).join(',');
    const newUrls = newPlaylist.map(p => p.url).join(',');

    if (oldUrls === newUrls) {
      console.log('Playlist unchanged, no rebuild needed.');
      return;
    }

    console.log(`Playlist updated: ${newPlaylist.length} items.`);

    const currentUrl = playlist[currentIdx]?.url;
    playlist = newPlaylist;
    buildSlides(playlist);
    syncCache(playlist);

    const resumeIdx = playlist.findIndex(p => p.url === currentUrl);
    currentIdx = resumeIdx >= 0 ? resumeIdx : 0;

    overlay.classList.add('hidden');
    showSlide(currentIdx);

  } catch (err) {
    console.error('Playlist refresh failed:', err);

    if (playlist.length === 0) {
      overlayMsg.textContent = 'Error loading playlist. Retrying...';
      overlay.classList.remove('hidden');
    } else {
      console.warn('Using cached playlist due to refresh error.');
    }
  }
}


/* ─── BOOT ───────────────────────────────────────────────────── */

async function init() {
  if (!CONFIG.WORKER_URL || CONFIG.WORKER_URL.includes('YOUR_SUBDOMAIN')) {
    overlayMsg.textContent = 'Set WORKER_URL in config.js.';
    overlay.classList.remove('hidden');
    document.querySelector('.spinner').style.display = 'none';
    return;
  }

  // Initial load
  await refreshPlaylist();

  // Schedule periodic refresh
  setInterval(refreshPlaylist, CONFIG.PLAYLIST_REFRESH_MS);
}

// Kick off
init();
</script>
</body>
</html>
